sonar.projectKey=chaimaa-tasklist-frontend
sonar.projectName=Chaimaa - TaskList frontend
# URL du serveur SonarQube
sonar.host.url=https://sonarqube.cicd.kits.ext.educentre.fr
# Sources (frontend application code)
sonar.sources=src
# Tests - include common test file extensions for TS/TSX and JS
sonar.tests=src
sonar.test.inclusions=src/**/__tests__/**/*.test.ts,src/**/__tests__/**/*.test.tsx,src/**/__tests__/**/*.test.js,src/**/__tests__/**/*.test.jsx,src/**/__tests__/**/*.e2e.test.ts,src/**/__tests__/**/*.e2e.test.tsx
# Exclusions - build, deps, coverage, reports, types and generated files
sonar.exclusions=\
node_modules/**,\
dist/**,\
coverage/**,\
reports/**,\
prisma/migrations/**,\
**/*.config.ts,\
**/*.config.js,\
**/*.d.ts,\
src/types/**,\
src/vite-env.d.ts
sonar.test.exclusions=\
node_modules/**,\
dist/**
# Couverture de tests TypeScript / JavaScript (lcov généré par Vitest)
sonar.typescript.lcov.reportPaths=coverage/lcov.info
sonar.javascript.lcov.reportPaths=coverage/lcov.info
# Encodage
sonar.sourceEncoding=UTF-8
# Duplication
sonar.cpd.exclusions=\
src/__tests__/**